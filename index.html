<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>二次元茶话会</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ==================== CSS Variables & Reset ==================== */
:root {
  --primary: #6366f1;
  --primary-light: #8b8ff5;
  --bg-gradient-1: #0f0c29;
  --bg-gradient-2: #302b63;
  --bg-gradient-3: #24243e;
  --glass-bg: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.18);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.7);
  --text-muted: rgba(255,255,255,0.4);
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  font-size: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
  min-height: 100vh;
  color: var(--text-primary);
  overflow-x: hidden;
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:4px; }
input, textarea, button, select { font-family:inherit; outline:none; }
a { color:var(--primary-light); text-decoration:none; }

/* ==================== Glass Card ==================== */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  box-shadow: var(--glass-shadow);
}

/* ==================== Login Page ==================== */
#loginPage {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:1000;
}
#loginPage .bg-deco {
  position:absolute; inset:0;
  overflow:hidden; pointer-events:none;
}
#loginPage .bg-deco span {
  position:absolute;
  font-size:80px; opacity:0.06; animation:float 20s infinite;
}
@keyframes float {
  0%,100% { transform:translateY(0) rotate(0deg); }
  33% { transform:translateY(-30px) rotate(5deg); }
  66% { transform:translateY(20px) rotate(-3deg); }
}
.login-card {
  max-width:420px; width:90%;
  padding:40px 32px;
  text-align:center;
  position:relative; z-index:1;
}
.login-card .logo {
  font-size:40px; margin-bottom:8px;
}
.login-card h1 {
  font-size:28px; font-weight:700;
  margin-bottom:4px;
}
.login-card .subtitle {
  color:var(--text-secondary); font-size:14px;
  margin-bottom:32px;
}
.login-card .tabs {
  display:flex; gap:4px;
  background:rgba(255,255,255,0.06);
  border-radius:var(--radius-sm);
  padding:4px;
  margin-bottom:24px;
}
.login-card .tabs button {
  flex:1; padding:10px;
  border:none; border-radius:6px;
  background:transparent; color:var(--text-secondary);
  font-size:14px; font-weight:500; cursor:pointer;
  transition:all 0.3s;
}
.login-card .tabs button.active {
  background:var(--primary);
  color:#fff;
}
.login-card .field {
  margin-bottom:16px;
  text-align:left;
}
.login-card .field label {
  font-size:12px; color:var(--text-secondary);
  display:block; margin-bottom:6px;
}
.login-card .field input {
  width:100%; padding:12px 16px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  color:#fff; font-size:15px;
  transition:border-color 0.3s;
}
.login-card .field input:focus { border-color:var(--primary); }
.login-card .field input::placeholder { color:var(--text-muted); }
.login-btn {
  width:100%; padding:14px;
  border:none; border-radius:var(--radius-sm);
  background:var(--primary);
  color:#fff; font-size:16px; font-weight:600;
  cursor:pointer; transition:opacity 0.3s;
  margin-top:8px;
}
.login-btn:hover { opacity:0.9; }
.login-btn:disabled { opacity:0.4; cursor:not-allowed; }
.login-error {
  color:var(--danger); font-size:13px;
  margin-top:12px; min-height:20px;
}
.login-card .admin-link {
  display:inline-block; margin-top:16px;
  color:var(--text-muted); font-size:13px; cursor:pointer;
  transition:color 0.3s;
}
.login-card .admin-link:hover { color:var(--primary-light); }
.admin-login-row {
  display:flex; gap:8px; margin-top:8px;
}
.admin-login-row input { flex:1; }
.admin-login-row button {
  padding:12px 20px;
  border:none; border-radius:var(--radius-sm);
  background:var(--warning); color:#000;
  font-size:14px; font-weight:600; cursor:pointer;
}

/* ==================== Main Layout ==================== */
#appMain { display:none; }
.app-header {
  position:fixed; top:0; left:0; right:0;
  z-index:100;
  padding:12px 16px;
  background:rgba(15,12,41,0.7);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid var(--glass-border);
  display:flex; align-items:center; justify-content:space-between;
}
.app-header .brand {
  display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;
}
.app-header .brand .logo-icon { font-size:24px; }
.app-header .header-actions { display:flex; align-items:center; gap:12px; }
.app-header .header-actions .btn-icon {
  width:36px; height:36px; border-radius:50%;
  border:none; background:rgba(255,255,255,0.1);
  color:#fff; cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.3s;
}
.app-header .header-actions .btn-icon:hover { background:rgba(255,255,255,0.2); }
.app-header .header-actions .my-avatar {
  width:34px; height:34px; border-radius:50%;
  object-fit:cover; cursor:pointer;
  border:2px solid var(--primary);
  transition:border-color 0.3s;
}

/* ==================== Bottom Nav ==================== */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  z-index:100;
  display:flex;
  background:rgba(15,12,41,0.7);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--glass-border);
  padding:4px 0; padding-bottom:env(safe-area-inset-bottom);
}
.bottom-nav .nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:6px 0 4px; gap:2px;
  border:none; background:transparent;
  color:var(--text-muted); cursor:pointer;
  font-size:10px; transition:color 0.3s;
}
.bottom-nav .nav-item.active { color:var(--primary-light); }
.bottom-nav .nav-item svg { width:24px; height:24px; }
.bottom-nav .nav-item .badge {
  position:absolute; top:2px; right:calc(50% - 18px);
  background:var(--danger); color:#fff;
  font-size:10px; min-width:18px; height:18px;
  border-radius:9px; display:flex; align-items:center; justify-content:center;
  padding:0 4px;
}
.bottom-nav .nav-item .nav-icon-wrap { position:relative; display:flex; }

/* ==================== Content Area ==================== */
.content-area {
  padding-top:58px;
  padding-bottom:66px;
  min-height:100vh;
}
.page { display:none; padding:16px; }
.page.active { display:block; }

/* ==================== Create Post ==================== */
.create-post {
  margin-bottom:16px;
  padding:16px;
  cursor:pointer;
  display:flex; align-items:center; gap:12px;
}
.create-post .cp-avatar {
  width:40px; height:40px; border-radius:50%;
  object-fit:cover; flex-shrink:0;
}
.create-post .cp-input {
  flex:1; padding:10px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);
  border-radius:20px;
  color:var(--text-secondary); font-size:14px;
  text-align:left; cursor:pointer;
  transition:border-color 0.3s;
}
.create-post .cp-input:hover { border-color:var(--primary); }

/* ==================== Post Card ==================== */
.post-card {
  padding:16px; margin-bottom:12px;
  transition:transform 0.2s;
}
.post-card:hover { transform:translateY(-1px); }
.post-card.pinned {
  border-color:var(--warning);
  background:rgba(245,158,11,0.06);
}
.post-card .pin-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:11px; color:var(--warning); margin-bottom:8px;
}
.post-card .post-header {
  display:flex; align-items:center; gap:10px;
  margin-bottom:10px;
}
.post-card .post-header .p-avatar {
  width:36px; height:36px; border-radius:50%;
  object-fit:cover; cursor:pointer;
  transition:opacity 0.3s;
}
.post-card .post-header .p-avatar:hover { opacity:0.8; }
.post-card .post-header .p-author { font-weight:600; font-size:14px; cursor:pointer; }
.post-card .post-header .p-author:hover { color:var(--primary-light); }
.post-card .post-header .p-time { font-size:12px; color:var(--text-muted); margin-left:auto; }
.post-card .topic-tag {
  display:inline-block; padding:2px 10px;
  border-radius:10px; font-size:11px;
  background:rgba(99,102,241,0.2); color:var(--primary-light);
  margin-bottom:8px;
}
.post-card .post-title {
  font-size:14px; font-weight:600; margin-bottom:6px;
}
.post-card .post-content {
  font-size:14px; line-height:1.7;
  color:var(--text-secondary); margin-bottom:12px;
  white-space:pre-wrap; word-break:break-word;
}
.post-card .post-actions {
  display:flex; gap:16px;
  border-top:1px solid var(--glass-border);
  padding-top:10px; margin-top:4px;
}
.post-card .post-actions button {
  display:flex; align-items:center; gap:4px;
  border:none; background:transparent;
  color:var(--text-muted); cursor:pointer;
  font-size:13px; transition:color 0.3s;
  padding:4px 8px; border-radius:6px;
}
.post-card .post-actions button:hover { background:rgba(255,255,255,0.05); }
.post-card .post-actions button.liked { color:var(--danger); }
.post-card .post-actions button.favorited { color:var(--warning); }
.post-card .post-actions button svg { width:18px; height:18px; }

/* ==================== Modal Base ==================== */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:500;
  display:none; align-items:center; justify-content:center;
  animation:fadeIn 0.2s;
}
.modal-overlay.show { display:flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  max-width:520px; width:92%;
  max-height:85vh; overflow-y:auto;
  padding:24px; animation:slideUp 0.25s;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
.modal .modal-header {
  display:flex; align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.modal .modal-header h2 { font-size:20px; font-weight:600; }
.modal .modal-close {
  width:32px; height:32px; border-radius:50%;
  border:none; background:rgba(255,255,255,0.1);
  color:#fff; cursor:pointer; font-size:18px;
  display:flex; align-items:center; justify-content:center;
}
.modal .field-group { margin-bottom:16px; }
.modal .field-group label {
  font-size:13px; color:var(--text-secondary);
  display:block; margin-bottom:6px;
}
.modal .field-group input,
.modal .field-group textarea,
.modal .field-group select {
  width:100%; padding:10px 14px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  color:#fff; font-size:14px;
  transition:border-color 0.3s;
}
.modal .field-group input:focus,
.modal .field-group textarea:focus,
.modal .field-group select:focus { border-color:var(--primary); }
.modal .field-group textarea { min-height:80px; resize:vertical; }
.modal .field-group select option { background:#1a1a2e; color:#fff; }
.modal .btn-primary {
  padding:12px 24px; border:none;
  border-radius:var(--radius-sm);
  background:var(--primary); color:#fff;
  font-size:15px; font-weight:600; cursor:pointer;
  transition:opacity 0.3s;
}
.modal .btn-primary:hover { opacity:0.9; }
.modal .btn-danger {
  padding:10px 20px; border:none;
  border-radius:var(--radius-sm);
  background:var(--danger); color:#fff;
  font-size:14px; cursor:pointer;
}
.modal .btn-warning {
  padding:10px 20px; border:none;
  border-radius:var(--radius-sm);
  background:var(--warning); color:#000;
  font-size:14px; cursor:pointer;
}

/* ==================== Comments ==================== */
.comment-section { margin-top:12px; border-top:1px solid var(--glass-border); padding-top:12px; }
.comment-input-area {
  display:flex; gap:8px; margin-bottom:12px;
}
.comment-input-area input {
  flex:1; padding:8px 14px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);
  border-radius:20px; color:#fff; font-size:13px;
}
.comment-input-area button {
  padding:8px 16px; border:none;
  border-radius:20px; background:var(--primary);
  color:#fff; font-size:13px; cursor:pointer;
}
.comment-item {
  display:flex; gap:8px; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.comment-item:last-child { border-bottom:none; }
.comment-item .c-avatar {
  width:28px; height:28px; border-radius:50%;
  object-fit:cover; cursor:pointer; flex-shrink:0;
}
.comment-item .c-body { flex:1; }
.comment-item .c-author { font-size:12px; font-weight:600; cursor:pointer; }
.comment-item .c-author:hover { color:var(--primary-light); }
.comment-item .c-text { font-size:13px; color:var(--text-secondary); margin-top:2px; }
.comment-item .c-time { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* ==================== Discussion Page ==================== */
.topic-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px; margin-bottom:20px;
}
.topic-card {
  padding:14px; text-align:center; cursor:pointer;
  transition:transform 0.2s;
}
.topic-card:hover { transform:translateY(-2px); }
.topic-card .topic-icon { font-size:28px; margin-bottom:6px; }
.topic-card .topic-name { font-size:13px; font-weight:500; }
.topic-card .topic-count { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* ==================== Chat Page ==================== */
.chat-tabs {
  display:flex; gap:4px;
  background:rgba(255,255,255,0.06);
  border-radius:var(--radius-sm); padding:4px;
  margin-bottom:16px;
}
.chat-tabs button {
  flex:1; padding:10px; border:none; border-radius:6px;
  background:transparent; color:var(--text-secondary);
  font-size:14px; font-weight:500; cursor:pointer;
  transition:all 0.3s;
}
.chat-tabs button.active { background:var(--primary); color:#fff; }

/* Group Chat */
.group-chat-box {
  display:flex; flex-direction:column;
  height:calc(100vh - 200px);
}
.group-chat-msgs {
  flex:1; overflow-y:auto; padding:12px;
}
.gc-msg {
  display:flex; gap:8px; margin-bottom:12px;
  align-items:flex-start;
}
.gc-msg .gc-avatar {
  width:32px; height:32px; border-radius:50%;
  object-fit:cover; flex-shrink:0; cursor:pointer;
}
.gc-msg .gc-bubble {
  max-width:75%;
}
.gc-msg .gc-author { font-size:12px; font-weight:600; margin-bottom:2px; }
.gc-msg .gc-author:hover { color:var(--primary-light); cursor:pointer; }
.gc-msg .gc-text {
  background:rgba(99,102,241,0.15);
  padding:8px 14px; border-radius:14px 14px 14px 4px;
  font-size:14px; line-height:1.5;
}
.gc-msg .gc-time { font-size:11px; color:var(--text-muted); margin-top:2px; }
.gc-input-area {
  display:flex; gap:8px; padding:12px;
  border-top:1px solid var(--glass-border);
}
.gc-input-area input {
  flex:1; padding:10px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);
  border-radius:20px; color:#fff; font-size:14px;
}
.gc-input-area button {
  padding:10px 20px; border:none; border-radius:20px;
  background:var(--primary); color:#fff;
  font-size:14px; cursor:pointer;
}

/* Private Chat */
.private-chat-layout {
  display:flex; gap:12px;
  height:calc(100vh - 200px);
}
.pc-contacts {
  width:140px; flex-shrink:0;
  overflow-y:auto; padding:8px;
}
.pc-contact {
  display:flex; align-items:center; gap:8px;
  padding:8px; border-radius:var(--radius-sm);
  cursor:pointer; margin-bottom:4px;
  transition:background 0.3s;
}
.pc-contact:hover { background:rgba(255,255,255,0.06); }
.pc-contact.active { background:rgba(99,102,241,0.15); }
.pc-contact img { width:32px; height:32px; border-radius:50%; object-fit:cover; }
.pc-contact .pc-name { font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pc-chat-area {
  flex:1; display:flex; flex-direction:column;
  border-left:1px solid var(--glass-border);
  padding-left:12px;
}
.pc-chat-area .pc-chat-header {
  font-size:14px; font-weight:600; padding:8px 0 12px;
  border-bottom:1px solid var(--glass-border);
}
.pc-msgs { flex:1; overflow-y:auto; padding:12px 0; }
.pc-msg-item {
  display:flex; gap:8px; margin-bottom:10px;
  align-items:flex-start;
}
.pc-msg-item .pc-msg-avatar {
  width:28px; height:28px; border-radius:50%;
  object-fit:cover; flex-shrink:0;
}
.pc-msg-item .pc-msg-bubble {
  background:rgba(255,255,255,0.08);
  padding:8px 14px; border-radius:14px;
  font-size:14px; max-width:70%;
}
.pc-msg-item.self { flex-direction:row-reverse; }
.pc-msg-item.self .pc-msg-bubble {
  background:rgba(99,102,241,0.25);
}
.pc-msg-item .pc-msg-time { font-size:11px; color:var(--text-muted); margin-top:2px; }
.pc-msg-item.self .pc-msg-time { text-align:right; }
.pc-input-area {
  display:flex; gap:8px; padding:8px 0;
}
.pc-input-area input {
  flex:1; padding:8px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);
  border-radius:20px; color:#fff; font-size:14px;
}
.pc-input-area button {
  padding:8px 20px; border:none; border-radius:20px;
  background:var(--primary); color:#fff; font-size:14px; cursor:pointer;
}

/* ==================== Profile Page ==================== */
.profile-header {
  text-align:center; padding:24px 16px;
  margin-bottom:16px;
}
.profile-header .ph-avatar {
  width:72px; height:72px; border-radius:50%;
  object-fit:cover; margin-bottom:12px;
  border:3px solid var(--primary);
  cursor:pointer;
}
.profile-header .ph-name { font-size:20px; font-weight:600; }
.profile-header .ph-bio { font-size:13px; color:var(--text-secondary); margin-top:4px; }
.profile-header .ph-stats {
  display:flex; justify-content:center; gap:24px;
  margin-top:12px; font-size:13px;
}
.profile-header .ph-stats span { color:var(--text-secondary); }
.profile-header .ph-stats strong { color:var(--text-primary); }
.profile-actions {
  display:flex; gap:8px; justify-content:center;
  margin-top:12px;
}
.profile-actions button {
  padding:8px 20px; border:none; border-radius:20px;
  font-size:13px; font-weight:500; cursor:pointer;
  transition:opacity 0.3s;
}
.profile-actions button:hover { opacity:0.8; }
.profile-actions .btn-primary2 { background:var(--primary); color:#fff; }
.profile-actions .btn-outline {
  background:transparent; border:1px solid var(--glass-border);
  color:var(--text-primary);
}
.profile-actions .following-btn { background:rgba(255,255,255,0.1); color:var(--text-primary); }
.profile-tabs {
  display:flex; gap:4px;
  background:rgba(255,255,255,0.06);
  border-radius:var(--radius-sm); padding:4px;
  margin-bottom:16px;
}
.profile-tabs button {
  flex:1; padding:10px; border:none; border-radius:6px;
  background:transparent; color:var(--text-secondary);
  font-size:13px; cursor:pointer; transition:all 0.3s;
}
.profile-tabs button.active { background:var(--primary); color:#fff; }

/* ==================== Settings Page ==================== */
.settings-list { margin-bottom:16px; }
.settings-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px;
  margin-bottom:8px;
  cursor:pointer; transition:background 0.3s;
}
.settings-item:hover { background:rgba(255,255,255,0.03); }
.settings-item .si-label { font-size:14px; }
.settings-item .si-value { font-size:13px; color:var(--text-secondary); }
.color-picker-grid {
  display:grid; grid-template-columns:repeat(6,1fr);
  gap:10px; margin:8px 0;
}
.color-pick {
  width:100%; aspect-ratio:1;
  border-radius:50%; border:3px solid transparent;
  cursor:pointer; transition:border-color 0.3s;

/* ==================== Media Upload & Display ==================== */
.media-upload-area {

@media (max-width:640px) {

/* ==================== Toast ==================== */

/* ==================== UI Beautification & Redesign ==================== */

/* ---- Page Transition ---- */
.page {

/* ---- Enhanced Glass Effect ---- */
.glass {

  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.glass:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}

/* ---- Animated Background Gradient ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 10% 20%, rgba(99,102,241,0.08), transparent),
    radial-gradient(ellipse 500px 500px at 90% 80%, rgba(236,72,153,0.06), transparent),
    radial-gradient(ellipse 400px 400px at 50% 50%, rgba(99,102,241,0.04), transparent);
  pointer-events: none;
  z-index: 0;
  animation: bgShift 15s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0% { transform: translate(0,0) scale(1); }
  33% { transform: translate(1%,-1%) scale(1.02); }
  66% { transform: translate(-1%,1%) scale(0.98); }
  100% { transform: translate(0.5%,0.5%) scale(1.01); }
}

/* ---- Floating Particles ---- */
.particle-container {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%;
  opacity: 0.08; animation: particleFloat linear infinite;
}
@keyframes particleFloat {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.08; }
  90% { opacity: 0.08; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* ---- Login Page Enhancement ---- */
.login-card {
  animation: loginCardIn 0.6s cubic-bezier(0.16,1,0.3,1);
  overflow: hidden;
}
.login-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--primary-light), #ec4899, var(--primary));
  background-size: 300% 100%;
  animation: shimmer 3s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 300% 0; }
  100% { background-position: -300% 0; }
}
@keyframes loginCardIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ---- Input Enhancement ---- */
.login-card .field input:focus,
.modal .field-group input:focus,
.modal .field-group textarea:focus,
.modal .field-group select:focus {
  border-color: var(--primary);

  transform: translateY(-1px);
}

/* ---- Button Enhancement ---- */
.login-btn, .btn-primary {
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.login-btn:hover, .btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 25px rgba(99,102,241,0.3);
}
.login-btn:active, .btn-primary:active {
  transform: translateY(0) scale(0.98);
}
.login-btn::after, .btn-primary::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}

/* ---- Bottom Nav Enhancement ---- */
.bottom-nav {
  padding-top: 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
}
.bottom-nav .nav-item {
  position: relative;
  padding: 4px 0 6px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.bottom-nav .nav-item.active {
  color: var(--primary-light);
  transform: translateY(-2px);
}
.bottom-nav .nav-item.active svg {
  filter: drop-shadow(0 0 8px rgba(99,102,241,0.3));
}
.bottom-nav .nav-item::before {
  content: '';
  position: absolute; top: 0; left: 50%;
  width: 0; height: 3px;
  background: var(--primary);
  border-radius: 0 0 3px 3px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  transform: translateX(-50%);
}
.bottom-nav .nav-item.active::before {
  width: 24px;
}
.bottom-nav .nav-item:active {
  transform: scale(0.92);
}

/* ---- Post Card Enhancement ---- */
.post-card {
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  cursor: default;
}
.post-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.35);
}
.post-card .post-header .p-avatar {
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);

}
.post-card .post-header .p-avatar:hover {
  border-color: var(--primary);
  transform: scale(1.08);
}
.post-card .post-actions button {
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  border-radius: 8px;
}
.post-card .post-actions button:hover {

  transform: scale(1.05);
}
.post-card .post-actions button:active {

}
.post-card .post-actions button.liked {

  text-shadow: 0 0 12px rgba(239,68,68,0.3);
}
.post-card .post-actions button.favorited {
  color: var(--warning);
  text-shadow: 0 0 12px rgba(245,158,11,0.3);
}

/* ---- Create Post Enhancement ---- */
.create-post {
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  border: 1px solid rgba(255,255,255,0.06);
}
.create-post:hover {

  box-shadow: 0 8px 30px rgba(99,102,241,0.15);
  transform: translateY(-1px);
}
.create-post .cp-avatar {
  transition: transform 0.3s;

}
.create-post:hover .cp-avatar {
  border-color: var(--primary);
}

/* ---- Topic Card Enhancement ---- */
.topic-card {
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  border: 1px solid rgba(255,255,255,0.06);
}
.topic-card:hover {

  border-color: var(--primary);

}

}

/* ---- Modal Enhancement ---- */
.modal {

}
@keyframes modalIn {

  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-overlay {
  backdrop-filter: blur(12px);

/* ---- Scrollbar Enhancement ---- */

.profile-header .ph-avatar {

<script>
/* ==================================================================
   JavaScript - 二次元茶话会 完整应用逻辑
   ================================================================== */

// ==================== Data Layer ====================
const DATA_KEY = 'erciyuan_teahouse_data';
// ==================== Backend API ====================
const API_BASE_URL = localStorage.getItem('tea_api_url') || (location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'http://localhost:3003' : location.origin);

function getApiToken() { return sessionStorage.getItem('tea_api_token') || localStorage.getItem('tea_api_token'); }
function setApiToken(t, p) {
  sessionStorage.setItem('tea_api_token', t);
  if (p) localStorage.setItem('tea_api_token', t);
}
function clearApiToken() {
  sessionStorage.removeItem('tea_api_token');
  localStorage.removeItem('tea_api_token');
}

async function apiPost(path, body) {
  const token = getApiToken();
  const headers = {'Content-Type':'application/json'};
  if (token) headers['x-auth-token'] = token;
  const r = await fetch(API_BASE_URL + path, {method:'POST', headers, body: JSON.stringify(body)});
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || '请求失败');
  return j;
}

async function apiGet(path) {
  const token = getApiToken();
  const headers = {};
  if (token) headers['x-auth-token'] = token;
  const r = await fetch(API_BASE_URL + path, {headers});
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || '请求失败');
  return j;
}

async function apiPut(path, body) {
  const token = getApiToken();
  const headers = {'Content-Type':'application/json'};
  if (token) headers['x-auth-token'] = token;
  const r = await fetch(API_BASE_URL + path, {method:'PUT', headers, body: JSON.stringify(body)});
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || '请求失败');
  return j;
}

async function apiDelete(path) {
  const token = getApiToken();
  const headers = {};
  if (token) headers['x-auth-token'] = token;
  const r = await fetch(API_BASE_URL + path, {method:'DELETE', headers});
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || '请求失败');
  return j;
}


function getDefaultData() {
  return {
    users: [{
      id: 'admin_001',
      phone: 'admin',
      password: 'Hty070818',
      nickname: '管理员',
      avatar: '',
      bio: '二次元茶话会管理员',
      role: 'admin',
      status: 'active',
      joinTime: Date.now(),
      followers: [],
      following: [],
      likedPosts: [],
      favoritedPosts: [],
      lastActive: Date.now(),
      postsCount: 0
    }],
    posts: [],
    groupMessages: [],
    privateMessages: [],
    registeredPhones: ['admin'],
    adminKey: 'admin888'
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem(DATA_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // ensure all fields
      if (!d.privateMessages) d.privateMessages = [];
      if (!d.groupMessages) d.groupMessages = [];
      if (!d.registeredPhones) d.registeredPhones = ['admin'];
      if (!d.adminKey) d.adminKey = 'admin888';
      d.users.forEach(u => {
        if (!u.likedPosts) u.likedPosts = [];
        if (!u.favoritedPosts) u.favoritedPosts = [];
        if (!u.followers) u.followers = [];
        if (!u.following) u.following = [];
        if (!u.bio) u.bio = '';
        if (!u.postsCount && u.postsCount !== 0) u.postsCount = 0;
        if (!u.status) u.status = 'active';
        if (!u.lastActive) u.lastActive = u.joinTime || Date.now();
      });
      d.posts.forEach(p => {
        if (!p.likes) p.likes = [];
        if (!p.favorites) p.favorites = [];
        if (!p.comments) p.comments = [];
        if (!p.views && p.views !== 0) p.views = 0;
        if (!p.topic) p.topic = 'acg';
        if (!p.pinned) p.pinned = false;
      });
      return d;
    }
  } catch(e) {}
  return getDefaultData();
}

function saveData() {
  localStorage.setItem(DATA_KEY, JSON.stringify(data));
  // Also save to server (fire-and-forget)
  const token = getApiToken();
  if (token) {
    apiPost('/api/save', {
      posts: data.posts.map(p => ({...p, comments: p.comments || []})),
      groupMessages: data.groupMessages || [],
      privateMessages: data.privateMessages || []
    }).catch(e => console.warn('Server save failed:', e.message));
  }
}

let data = loadData();
// Try to sync from server
(async function syncFromServer() {
  try {
    const token = getApiToken();
    if (token) {
      const result = await apiGet('/api/load');
      data.users = result.users;
      data.posts = result.posts;
      data.groupMessages = result.groupMessages;
      data.privateMessages = result.privateMessages;
      data.adminKey = result.adminKey;
      data.registeredPhones = result.registeredPhones || [];
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
      // If session token exists but no active session, check if auto-login
      const savedUid = sessionStorage.getItem('teahouse_session');
      if (savedUid) {
        const u = data.users.find(x => x.id === savedUid);
        if (u && u.status === 'active') {
          currentUser = u;
          // Will be rendered by DOMContentLoaded
        }
      }
    }
  } catch(e) {
    console.warn('Server sync failed, using local data:', e.message);
  }
})();


// ==================== Utilities ====================
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff/60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  const hours = Math.floor(mins/60);
  if (hours < 24) return hours + '小时前';
  const days = Math.floor(hours/24);
  if (days < 7) return days + '天前';
  return new Date(ts).toLocaleDateString('zh-CN');
}

  const colors = ['6366f1','8b5cf6','ec4899','f43f5e','f97316','eab308','22c55e','14b8a6','06b6d4','3b82f6'];
  const c = colors[name.charCodeAt(0) % colors.length];
  const char = name.charAt(0) || '?';
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#${c}" rx="50"/><text x="50" y="56" text-anchor="middle" fill="white" font-size="36" font-weight="600" font-family="sans-serif">${char}</text></svg>`)}`;
}

function getAvatar(user) {
  return user.avatar || getDefaultAvatar(user.nickname);
}

let currentUser = null;
let pendingMedia = [];

let currentPage = 'home';
let selectedTopic = null;
let selectedPrivateUser = null;
let viewingUserId = null;

function getCurrentUser() {
  return data.users.find(u => u.id === currentUser?.id);
}


// ==================== Floating Particles ====================
(function initParticles() {
  const container = document.getElementById('particleContainer');
  if (!container) return;
  const colors = ['6366f1', '8b5cf6', 'ec4899', '06b6d4', '22c55e', 'f97316'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      background: #${colors[i % colors.length]};
      animation-duration: ${Math.random() * 20 + 15}s;
      animation-delay: ${Math.random() * 15}s;
    `;
    container.appendChild(p);
  }
})();


// ==================== Toast ====================
function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 2500);
}



// ==================== Media Upload ====================
function handleMediaSelect() {
  const input = document.getElementById('mediaInput');
  const files = Array.from(input.files);
  const remaining = 9 - pendingMedia.length;
  
  if (files.length > remaining) {
    showToast('最多只能添加9个媒体文件', 'error');
    return;
  }
  
  let loaded = 0;
  files.forEach(file => {
    // Check file size (5MB limit)
    if (file.size > 5 * 1024 * 1024) {
      showToast(file.name + ' 超过5MB限制', 'error');
      return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
      pendingMedia.push({
        data: e.target.result,
        type: file.type.startsWith('video/') ? 'video' : 'image',
        name: file.name
      });
      loaded++;
      if (loaded === files.length) {
        input.value = '';
        renderMediaPreview();
      }
    };
    reader.onerror = function() {
      showToast('读取文件失败: ' + file.name, 'error');
      loaded++;
      if (loaded === files.length) {
        input.value = '';
      }
    };
    reader.readAsDataURL(file);
  });
}

function renderMediaPreview() {
  const container = document.getElementById('mediaPreview');
  container.innerHTML = pendingMedia.map((m, i) => {
    return '<div class="media-preview-item">' +
      (m.type === 'video'
        ? '<video src="' + m.data + '"></video>'
        : '<img src="' + m.data + '">') +
      '<button class="remove-media" onclick="removePendingMedia(' + i + ')">✕</button></div>';
  }).join('');
}

function removePendingMedia(index) {
  pendingMedia.splice(index, 1);
  renderMediaPreview();
}

function renderPostMedia(media) {
  if (!media || media.length === 0) return '';
  const count = media.length;
  let cls = 'c1';
  if (count === 2) cls = 'c2';
  else if (count >= 3) cls = 'c3p';
  
  let items = media.map(m => {
    if (m.type === 'video') {
      return '<div class="post-media-item">' +
        '<video src="' + m.data + '" onclick="this.paused ? this.play() : this.pause()" preload="metadata"></video>' +
        '<div class="video-play-icon">▶</div></div>';
    } else {
      var s = m.data; return '<div class="post-media-item"><img src="' + s + '" loading="lazy" onclick="openImageViewer(this.src)"></div>';
    }
  }).join('');
  
  return '<div class="post-media-grid ' + cls + '">' + items + '</div>';
}

function renderDetailMedia(media) {
  if (!media || media.length === 0) return '';
  return media.map(m => {
    if (m.type === 'video') {
      return '<div class="detail-media-item"><video src="' + m.data + '" controls preload="metadata"></video></div>';
    } else {
      var s = m.data; return '<div class="detail-media-item"><img src="' + s + '" onclick="openImageViewer(this.src)" style="cursor:pointer"></div>';
    }
  }).join('');
}

function openImageViewer(src) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer';
  overlay.onclick = () => overlay.remove();
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:92%;max-height:92%;border-radius:8px;object-fit:contain';
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}


// ==================== SSE Real-time Sync ====================
(function connectSSE() {
  try {
    const evtSource = new EventSource(API_BASE_URL + '/api/events');
    evtSource.onmessage = function(e) {
      try {
        const d = JSON.parse(e.data);
        if (d.refresh) {
          // Quietly sync data from server
          const token = getApiToken();
          if (token && currentUser) {
            apiGet('/api/load').then(result => {
              data.users = result.users;
              data.posts = result.posts;
              data.groupMessages = result.groupMessages;
              data.privateMessages = result.privateMessages;
              data.adminKey = result.adminKey;
              data.registeredPhones = result.registeredPhones || [];
              localStorage.setItem(DATA_KEY, JSON.stringify(data));
              // Re-render current page
              if (currentPage === 'home') renderFeed();
              else if (currentPage === 'discussion') renderDiscussion();
              else if (currentPage === 'chat') renderChat();
              else if (currentPage === 'profile') renderMyProfile();
            }).catch(() => {});
          }
        }
      } catch(ex) {}
    };
    evtSource.onerror = function() {
      // Reconnect after 5s
      setTimeout(connectSSE, 5000);
    };
  } catch(e) {
    // SSE not supported, use polling instead
    setInterval(() => {
      const token = getApiToken();
      if (token && currentUser) {
        apiGet('/api/load').then(result => {
          const oldLen = data.posts.length + (data.groupMessages||[]).length;
          data.users = result.users;
          data.posts = result.posts;
          data.groupMessages = result.groupMessages;
          data.privateMessages = result.privateMessages;
          const newLen = data.posts.length + (data.groupMessages||[]).length;
          localStorage.setItem(DATA_KEY, JSON.stringify(data));
          if (newLen !== oldLen && currentPage === 'home') renderFeed();
          else if (newLen !== oldLen && currentPage === 'discussion') renderDiscussion();
          else if (newLen !== oldLen && currentPage === 'chat') renderChat();
        }).catch(() => {});
      }
    }, 5000);
  }
})();

// ==================== Login / Register ====================
let loginTab = 'login';
let showAdminLoginFlag = false;

document.addEventListener('DOMContentLoaded', () => {
  initLogin();
  // check if already logged in
  const saved = sessionStorage.getItem('teahouse_session');
  if (saved) {
    const uid = saved;
    const u = data.users.find(x => x.id === uid);
    if (u && u.status === 'active') {
      currentUser = u;
      enterApp();
      renderAll();
      return;
    }
  }
  // seed some demo posts and group messages
  seedDemoData();
});

function initLogin() {
  // Tabs
  document.querySelectorAll('#loginTabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#loginTabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loginTab = btn.dataset.tab;
      document.getElementById('loginForm').style.display = loginTab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = loginTab === 'register' ? 'block' : 'none';
      document.getElementById('loginError').textContent = '';
      document.getElementById('regError').textContent = '';
    });
  });
  
  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.getElementById('registerBtn').addEventListener('click', handleRegister);
  document.getElementById('showAdminLogin').addEventListener('click', () => {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('adminLoginForm').style.display = 'block';
    document.getElementById('loginError').textContent = '';
  });
  document.getElementById('backToUserLogin').addEventListener('click', () => {
    document.getElementById('adminLoginForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('adminError').textContent = '';
  });
  document.getElementById('adminLoginBtn').addEventListener('click', handleAdminLogin);
  
  // Enter key support
  document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
  document.getElementById('regPassword2').addEventListener('keydown', e => { if(e.key==='Enter') handleRegister(); });
  document.getElementById('adminKey').addEventListener('keydown', e => { if(e.key==='Enter') handleAdminLogin(); });
}

function handleLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  
  if (!phone) { err.textContent = '请输入手机号'; return; }
  if (!pwd) { err.textContent = '请输入密码'; return; }
  
  // Try server login
  apiPost('/api/login', {phone, password: pwd}).then(r => {
    setApiToken(r.token, false);
    currentUser = r.user;
    sessionStorage.setItem('teahouse_session', r.user.id);
    err.textContent = '';
    // Sync data from server
    return apiGet('/api/load').then(d => {
      data = { users: d.users, posts: d.posts, groupMessages: d.groupMessages, 
               privateMessages: d.privateMessages, adminKey: d.adminKey,
               registeredPhones: d.registeredPhones || [] };
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
      enterApp();
      renderAll();
    });
  }).catch(e => {
    // Fallback: try local login
    const user = data.users.find(u => u.phone === phone && u.password === pwd);
    if (!user) { err.textContent = e.message || '手机号或密码错误'; return; }
    if (user.status === 'banned') { err.textContent = '该账号已被封禁'; return; }
    if (user.status === 'deactivated') { err.textContent = '该账号已注销'; return; }
    user.lastActive = Date.now();
    saveData();
    currentUser = user;
    sessionStorage.setItem('teahouse_session', user.id);
    err.textContent = '';
    enterApp();
    renderAll();
  });
}

function handleRegister() {
  const phone = document.getElementById('regPhone').value.trim();
  const nickname = document.getElementById('regNickname').value.trim();
  const pwd = document.getElementById('regPassword').value;
  const pwd2 = document.getElementById('regPassword2').value;
  const err = document.getElementById('regError');
  
  if (!phone || phone.length < 11) { err.textContent = '请输入正确的手机号（11位）'; return; }
  if (!nickname) { err.textContent = '请输入昵称'; return; }
  if (pwd.length < 6) { err.textContent = '密码至少6位'; return; }
  if (pwd !== pwd2) { err.textContent = '两次密码不一致'; return; }
  
  // Register via server
  apiPost('/api/register', {phone, password: pwd, nickname}).then(r => {
    setApiToken(r.token, false);
    err.textContent = '';
    showToast('注册成功！欢迎加入二次元茶话会 🎉', 'success');
    currentUser = r.user;
    sessionStorage.setItem('teahouse_session', r.user.id);
    // Update local data
    return apiGet('/api/load').then(d => {
      data = { users: d.users, posts: d.posts, groupMessages: d.groupMessages,
               privateMessages: d.privateMessages, adminKey: d.adminKey,
               registeredPhones: d.registeredPhones || [] };
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
      enterApp();
      renderAll();
    });
  }).catch(e => {
    // Fallback: local registration
    if (data.registeredPhones.includes(phone)) {
      err.textContent = '该手机号已被注册';
      return;
    }
    const newUser = {
      id: genId(), phone, password: pwd, nickname, avatar: '', bio: '',
      role: 'user', status: 'active', joinTime: Date.now(), followers: [],
      following: [], likedPosts: [], favoritedPosts: [], lastActive: Date.now(), postsCount: 0
    };
    data.users.push(newUser);
    data.registeredPhones.push(phone);
    saveData();
    err.textContent = '';
    showToast('注册成功！欢迎加入二次元茶话会 🎉', 'success');
    currentUser = newUser;
    sessionStorage.setItem('teahouse_session', newUser.id);
    enterApp();
    renderAll();
  });
}

function handleAdminLogin() {
  const key = document.getElementById('adminKey').value;
  const phone = document.getElementById('adminPhone').value.trim();
  const err = document.getElementById('adminError');
  
  // Try server admin login
  apiPost('/api/admin/login', {key, phone}).then(r => {
    setApiToken(r.token, false);
    err.textContent = '';
    return apiGet('/api/load').then(d => {
      data = { users: d.users, posts: d.posts, groupMessages: d.groupMessages,
               privateMessages: d.privateMessages, adminKey: d.adminKey,
               registeredPhones: d.registeredPhones || [] };
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
      currentUser = r.user;
      sessionStorage.setItem('teahouse_session', r.user.id);
      enterApp();
      renderAll();
      showToast('管理员登录成功', 'success');
    });
  }).catch(e => {
    // Fallback: local admin login
    if (key !== data.adminKey) { err.textContent = '管理员密钥错误'; return; }
    let admin = data.users.find(u => u.role === 'admin');
    if (phone) {
      let u = data.users.find(x => x.phone === phone && x.role === 'admin');
      if (u) admin = u;
      else if (phone === 'admin') admin = data.users.find(x => x.id === 'admin_001');
    }
    if (!admin) { err.textContent = '未找到管理员账号'; return; }
    admin.lastActive = Date.now();
    saveData();
    currentUser = admin;
    sessionStorage.setItem('teahouse_session', admin.id);
    err.textContent = '';
    enterApp();
    renderAll();
    showToast('管理员登录成功', 'success');
  });
}

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.bottom-nav .nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.bottom-nav .nav-item[data-page="${page}"]`).classList.add('active');

  document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  
  if (page === 'home') renderFeed();
  else if (page === 'discussion') renderDiscussion();
  else if (page === 'chat') renderChat();

// ==================== Post System ====================
function openCreatePost() {
  document.getElementById('postTitle').value = '';
  document.getElementById('postContent').value = '';
  document.getElementById('postTopic').value = 'acg';
  pendingMedia = [];
  document.getElementById('mediaPreview').innerHTML = '';
  document.getElementById('mediaInput').value = '';
  openModal('createPostModal');
}

function submitPost() {
  const title = document.getElementById('postTitle').value.trim();
  const content = document.getElementById('postContent').value.trim();
  const topic = document.getElementById('postTopic').value;
  const u = getCurrentUser();
  
  if (!content && !title) { showToast('请输入帖子内容或标题', 'error'); return; }
  
  const post = {
    id: genId(),
    userId: u.id,
    title,
    content: content || title,
    topic,
    likes: [],
    favorites: [],
    comments: [],
    media: pendingMedia.length > 0 ? pendingMedia.slice() : [],
    pinned: false,
    pinnedBy: null,
    createdAt: Date.now(),
    views: 0
  };
  
  data.posts.unshift(post);
  u.postsCount = (u.postsCount || 0) + 1;
  pendingMedia = [];
  document.getElementById('mediaPreview').innerHTML = '';
  saveData();
  closeModal('createPostModal');
  showToast('发布成功！', 'success');
  renderFeed();
}

function renderFeed(filterTopic) {
  const feed = document.getElementById('postFeed');
  let posts = [...data.posts];
  
  if (filterTopic) {
    posts = posts.filter(p => p.topic === filterTopic);
  }
  
  // Sort: pinned first, then by time
  posts.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return b.createdAt - a.createdAt;
  });
  
  if (posts.length === 0) {
    feed.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">还没有帖子，快来发布第一条吧！</div></div>`;
    return;
  }
  
  feed.innerHTML = posts.map(p => renderPostCard(p)).join('');
}

function renderPostCard(post) {
  const author = data.users.find(u => u.id === post.userId);
  if (!author || author.status === 'deactivated') return '';
  const u = getCurrentUser();
  const isLiked = u ? post.likes.includes(u.id) : false;
  const isFav = u ? post.favorites.includes(u.id) : false;
  const isPinned = post.pinned;
  const topicNames = {
    'acg':'🎮 ACG综合','anime':'🎬 新番讨论','manga':'📖 漫画推荐',
    'game':'🎮 游戏交流','music':'🎵 音乐推荐','art':'🎨 创作展示',
    'cos':'📸 COS摄影','life':'💬 日常灌水','other':'📌 其他'
  };
  
  return `
    <div class="post-card glass ${isPinned ? 'pinned' : ''}">
      ${isPinned ? '<div class="pin-badge">📌 置顶</div>' : ''}
      <div class="post-header">
        <img class="p-avatar" src="${getAvatar(author)}" onclick="visitUserProfile('${author.id}')" title="查看${author.nickname}的主页">
        <span class="p-author" onclick="visitUserProfile('${author.id}')">${author.nickname}</span>
        <span class="topic-tag">${topicNames[post.topic] || '📌 其他'}</span>
        <span class="p-time">${timeAgo(post.createdAt)}</span>
      </div>
      ${post.title ? `<div class="post-title">${escHtml(post.title)}</div>` : ''}
      <div class="post-content">${escHtml(post.content)}</div>
      ${post.media && post.media.length > 0 ? renderPostMedia(post.media) : ''}
      <div class="post-actions">
        <button class="${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
          <svg viewBox="0 0 24 24" fill="${isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
          ${post.likes.length}
        </button>
        <button class="${isFav ? 'favorited' : ''}" onclick="toggleFavorite('${post.id}')">
          <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          ${post.favorites.length}
        </button>
        <button onclick="openPostDetail('${post.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${post.comments.length}
        </button>
        <button onclick="openPostDetail('${post.id}')" style="margin-left:auto;color:var(--primary-light)">
          查看详情 →
        </button>
      </div>
    </div>
  `;
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleLike(postId) {
  const u = getCurrentUser();
  if (!u) return;
  const post = data.posts.find(p => p.id === postId);
  if (!post) return;
  
  const idx = post.likes.indexOf(u.id);
  if (idx > -1) {
    post.likes.splice(idx, 1);
  } else {
    post.likes.push(u.id);
    // also add to user's likedPosts
    if (!u.likedPosts.includes(postId)) u.likedPosts.push(postId);
  }
  saveData();
  renderFeed(selectedTopic);
}

function toggleFavorite(postId) {
  const u = getCurrentUser();
  if (!u) return;
  const post = data.posts.find(p => p.id === postId);
  if (!post) return;
  
  const idx = post.favorites.indexOf(u.id);
  if (idx > -1) {
    post.favorites.splice(idx, 1);
    u.favoritedPosts = (u.favoritedPosts || []).filter(id => id !== postId);
  } else {
    post.favorites.push(u.id);
    if (!u.favoritedPosts.includes(postId)) u.favoritedPosts.push(postId);
  }
  saveData();
  renderFeed(selectedTopic);
}

      <span style="font-size:12px;color:var(--text-muted);margin-left:auto">${timeAgo(post.createdAt)}</span>
    </div>
    ${post.pinned ? '<div style="color:var(--warning);font-size:13px;margin-bottom:8px">📌 管理员已将此帖置顶</div>' : ''}
    ${post.title ? `<div style="font-size:16px;font-weight:600;margin-bottom:8px">${escHtml(post.title)}</div>` : ''}
    <div style="font-size:14px;line-height:1.8;color:var(--text-secondary);margin-bottom:12px;white-space:pre-wrap">${escHtml(post.content)}</div>
    ${post.media && post.media.length > 0 ? renderDetailMedia(post.media) : ''}

      <span>❤️ ${post.likes.length} 赞</span>
      <span>⭐ ${post.favorites.length} 收藏</span>
      <span>👁️ ${post.views || 0} 浏览</span>

    <div style="display:flex;gap:8px;margin-bottom:16px">

      </button>
      <button style="padding:8px 20px;border:none;border-radius:20px;background:${post.favorites.includes(u?.id) ? 'var(--warning)' : 'rgba(255,255,255,0.08)'};color:${post.favorites.includes(u?.id) ? '#000' : '#fff'};cursor:pointer;font-size:13px" onclick="toggleFavorite('${post.id}');openPostDetail('${post.id}')">
        ${post.favorites.includes(u?.id) ? '⭐ 已收藏' : '☆ 收藏'}
      </button>
    </div>
    <div class="comment-section">
      <div class="comment-input-area">
        <input type="text" id="commentInput_${post.id}" placeholder="写下你的评论..." maxlength="200">
        <button onclick="addComment('${post.id}')">发送</button>
      </div>
      ${post.comments.map(c => {
        const cu = data.users.find(x => x.id === c.userId);
        if (!cu) return '';
        return `
          <div class="comment-item">
            <img class="c-avatar" src="${getAvatar(cu)}" onclick="closeModal('postDetailModal');visitUserProfile('${cu.id}')">
            <div class="c-body">
              <span class="c-author" onclick="closeModal('postDetailModal');visitUserProfile('${cu.id}')">${cu.nickname}</span>
              <div class="c-text">${escHtml(c.content)}</div>

          </div>
        `;
      }).join('')}
    </div>
  `;
  
  document.getElementById('postDetailContent').innerHTML = html;
  openModal('postDetailModal');

function addComment(postId) {
  const input = document.getElementById('commentInput_' + postId);
  const content = input.value.trim();
  const u = getCurrentUser();
  if (!content) { showToast('请输入评论内容', 'error'); return; }
  
  const post = data.posts.find(p => p.id === postId);
  if (!post) return;
  
  post.comments.push({
    userId: u.id,
    content,
    time: Date.now()
  });
  saveData();
  showToast('评论成功', 'success');
  openPostDetail(postId);
}

// ==================== Discussion Page ====================
const topicDefs = [
  { id:'acg', icon:'🎮', name:'ACG综合', desc:'动漫游戏综合讨论' },
  { id:'anime', icon:'🎬', name:'新番讨论', desc:'追番看番交流' },
  { id:'manga', icon:'📖', name:'漫画推荐', desc:'漫画安利与吐槽' },
  { id:'game', icon:'🎮', name:'游戏交流', desc:'游戏攻略与联机' },
  { id:'music', icon:'🎵', name:'音乐推荐', desc:'好听的ACG音乐' },
  { id:'art', icon:'🎨', name:'创作展示', desc:'画图、写文、手工' },
  { id:'cos', icon:'📸', name:'COS摄影', desc:'Cosplay作品分享' },
  { id:'life', icon:'💬', name:'日常灌水', desc:'什么都聊' },
  { id:'other', icon:'📌', name:'其他', desc:'无法分类的帖子' }
];

function renderDiscussion() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = topicDefs.map(t => {
    const count = data.posts.filter(p => p.topic === t.id).length;
    return `
      <div class="topic-card glass" onclick="selectTopic('${t.id}')">
        <div class="topic-icon">${t.icon}</div>
        <div class="topic-name">${t.name}</div>
        <div class="topic-count">${count} 个帖子</div>
      </div>
    `;
  }).join('');
  
  // If a topic is selected, show filtered posts
  const container = document.getElementById('discussionPosts');
  if (selectedTopic) {
    const t = topicDefs.find(x => x.id === selectedTopic);
    container.innerHTML = `<h3 style="margin-bottom:12px;font-size:16px">${t ? t.icon + ' ' + t.name : ''} 话题</h3>`;
    const filtered = data.posts.filter(p => p.topic === selectedTopic);
    if (filtered.length === 0) {
      container.innerHTML += `<div class="empty-state"><div class="empty-text">该话题下还没有帖子</div></div>`;
    } else {
      container.innerHTML += filtered.map(p => renderPostCard(p)).join('');
    }
  } else {

// ==================== Chat System ====================
let chatTab = 'group';

function renderChat() {
  document.querySelectorAll('#chatTabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#chatTabs button[data-chat-tab="${chatTab}"]`).classList.add('active');
  
  if (chatTab === 'group') {
    document.getElementById('groupChat').style.display = 'flex';
    document.getElementById('privateChat').style.display = 'none';
    renderGroupChat();
  } else {
    document.getElementById('groupChat').style.display = 'none';
    document.getElementById('privateChat').style.display = 'block';
    renderPrivateChat();
  }
}

document.querySelectorAll('#chatTabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    chatTab = btn.dataset.chatTab;
    renderChat();
  });
});

// ---- Group Chat ----
function renderGroupChat() {
  const container = document.getElementById('groupChat');
  const msgs = data.groupMessages || [];
  
  let html = `<div class="group-chat-msgs" id="groupChatMsgs">`;
  if (msgs.length === 0) {
    html += `<div class="empty-state"><div class="empty-text">还没有群聊消息，来打个招呼吧 👋</div></div>`;
  } else {
    html += msgs.map(m => {
      const u = data.users.find(x => x.id === m.userId);
      if (!u) return '';
      return `
        <div class="gc-msg">
          <img class="gc-avatar" src="${getAvatar(u)}" onclick="visitUserProfile('${u.id}')">
          <div class="gc-bubble">
            <div class="gc-author" onclick="visitUserProfile('${u.id}')">${u.nickname}</div>
            <div class="gc-text">${escHtml(m.content)}</div>
            <div class="gc-time">${timeAgo(m.time)}</div>
          </div>
        </div>
      `;
    }).join('');
  }
  html += `</div>
    <div class="gc-input-area">
      <input type="text" id="gcInput" placeholder="输入群聊消息..." maxlength="500" onkeydown="if(event.key==='Enter')sendGroupMsg()">
      <button onclick="sendGroupMsg()">发送</button>
    </div>`;
  
  container.innerHTML = html;
  
  // Scroll to bottom
  requestAnimationFrame(() => {
    const msgsDiv = document.getElementById('groupChatMsgs');
    if (msgsDiv) msgsDiv.scrollTop = msgsDiv.scrollHeight;
  });
}

function sendGroupMsg() {
  const input = document.getElementById('gcInput');
  const content = input.value.trim();
  const u = getCurrentUser();
  if (!content) return;
  
  if (!data.groupMessages) data.groupMessages = [];
  data.groupMessages.push({
    id: genId(),
    userId: u.id,
    content,
    time: Date.now()
  });
  saveData();
  input.value = '';
  renderGroupChat();
}

// ---- Private Chat ----
function renderPrivateChat() {
  renderContacts();
  if (selectedPrivateUser) {
    renderPrivateMessages(selectedPrivateUser);
  }
}

function getPrivateChatUsers() {
  const u = getCurrentUser();
  if (!u) return [];
  const msgs = data.privateMessages || [];
  const userIds = new Set();
  msgs.forEach(m => {
    if (m.from === u.id) userIds.add(m.to);
    if (m.to === u.id) userIds.add(m.from);
  });
  // Also add users who follow or are followed
  u.following.forEach(id => userIds.add(id));
  u.followers.forEach(id => userIds.add(id));
  
  return Array.from(userIds).map(id => data.users.find(x => x.id === id)).filter(Boolean);
}

function renderContacts() {
  const container = document.getElementById('pcContacts');
  const u = getCurrentUser();
  const contacts = data.users.filter(x => x.id !== u.id && x.status === 'active');
  
  if (contacts.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:16px;font-size:13px;color:var(--text-muted)">暂无联系人</div>`;
    return;
  }
  
  container.innerHTML = contacts.map(c => {
    const unread = (data.privateMessages || []).filter(m => m.from === c.id && m.to === u.id && !m.read).length;
    return `
      <div class="pc-contact ${selectedPrivateUser === c.id ? 'active' : ''}" onclick="selectPrivateChat('${c.id}')">
        <img src="${getAvatar(c)}" alt="">
        <div class="pc-name">${c.nickname}${unread > 0 ? `<span style="color:var(--danger);margin-left:4px;font-size:11px">(${unread})</span>` : ''}</div>
      </div>
    `;
  }).join('');
}

function selectPrivateChat(userId) {
  selectedPrivateUser = userId;
  renderContacts();
  renderPrivateMessages(userId);
}

function renderPrivateMessages(userId) {
  const target = data.users.find(u => u.id === userId);
  if (!target) return;
  
  document.getElementById('pcChatHeader').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px">
      <img src="${getAvatar(target)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;cursor:pointer" onclick="visitUserProfile('${target.id}')">
      <span>${target.nickname}</span>
    </div>
  `;
  
  const u = getCurrentUser();
  const msgs = (data.privateMessages || []).filter(m =>
    (m.from === u.id && m.to === userId) || (m.from === userId && m.to === u.id)
  );
  
  // Mark as read
  msgs.forEach(m => { if (m.from === userId && m.to === u.id) m.read = true; });
  saveData();
  
  const container = document.getElementById('pcMsgs');
  if (msgs.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:14px">开始聊天吧 💬</div>`;
  } else {
    container.innerHTML = msgs.map(m => {
      const isSelf = m.from === u.id;
      const sender = data.users.find(x => x.id === m.from);
      return `
        <div class="pc-msg-item ${isSelf ? 'self' : ''}">
          ${!isSelf ? `<img class="pc-msg-avatar" src="${getAvatar(sender)}" onclick="visitUserProfile('${sender.id}')">` : ''}
          <div>
            <div class="pc-msg-bubble">${escHtml(m.content)}</div>
            <div class="pc-msg-time">${timeAgo(m.time)}</div>
          </div>
        </div>
      `;
    }).join('');
  }
  
  container.scrollTop = container.scrollHeight;
  document.getElementById('pcInputArea').style.display = 'flex';
  document.getElementById('pcInput').focus();
}

function sendPrivateMsg() {
  const input = document.getElementById('pcInput');
  const content = input.value.trim();
  const u = getCurrentUser();
  if (!content || !selectedPrivateUser) return;
  
  if (!data.privateMessages) data.privateMessages = [];
  data.privateMessages.push({
    id: genId(),
    from: u.id,
    to: selectedPrivateUser,
    content,
    time: Date.now(),
    read: false
  });
  saveData();
  input.value = '';
  renderPrivateMessages(selectedPrivateUser);
}

// ==================== Visit User Profile ====================
function visitUserProfile(userId) {
  const u = data.users.find(x => x.id === userId);
  if (!u) return;
  const me = getCurrentUser();
  
  const isMe = me && me.id === userId;
  const isFollowing = me ? (me.following || []).includes(userId) : false;
  
  const userPosts = data.posts.filter(p => p.userId === userId);
  
  let html = `
    <img class="vp-avatar" src="${getAvatar(u)}">
    <div class="vp-name">${u.nickname}${u.role === 'admin' ? ' 🛡️' : ''}</div>
    <div class="vp-bio">${u.bio || '这个人很懒，什么都没写~'}</div>
    <div class="vp-stats">
      <div><strong>${u.postsCount || 0}</strong><br><span>帖子</span></div>
      <div><strong id="vpFollowerCount">${(u.followers||[]).length}</strong><br><span>粉丝</span></div>
      <div><strong>${(u.following||[]).length}</strong><br><span>关注</span></div>
    </div>
  `;
  
  if (!isMe) {
    html += `
      <div class="vp-actions">
        <button style="background:var(--primary);color:#fff" onclick="toggleFollow('${userId}')" id="followBtn">
          ${isFollowing ? '✅ 已关注' : '➕ 关注'}
        </button>
        <button style="background:rgba(255,255,255,0.1);color:#fff" onclick="startPrivateChat('${userId}')">
          💬 私聊
        </button>
      </div>
    `;
  }
  
  html += `<div class="vp-posts-title">${u.nickname} 的作品 (${userPosts.length})</div>`;
  
  if (userPosts.length === 0) {
    html += `<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:14px">暂无帖子</div>`;
  } else {
    html += userPosts.slice(0, 10).map(p => renderPostCard(p)).join('');
  }
  
  document.getElementById('visitProfileContent').innerHTML = html;
  openModal('visitProfileModal');
}

function toggleFollow(targetId) {
  const me = getCurrentUser();
  if (!me) return;
  const target = data.users.find(u => u.id === targetId);
  if (!target) return;
  
  const idx = (me.following || []).indexOf(targetId);
  if (idx > -1) {
    me.following.splice(idx, 1);
    target.followers = (target.followers || []).filter(id => id !== me.id);
    showToast('已取消关注', 'info');
  } else {
    if (!me.following) me.following = [];
    me.following.push(targetId);
    if (!target.followers) target.followers = [];
    if (!target.followers.includes(me.id)) target.followers.push(me.id);
    showToast('关注成功', 'success');
  }
  saveData();
  visitUserProfile(targetId);
  renderMyProfile();
}

function startPrivateChat(userId) {
  closeModal('visitProfileModal');
  selectedPrivateUser = userId;
  chatTab = 'private';
  switchPage('chat');
  renderChat();
}

function renderAdminDashboard() {
  const dashboard = document.getElementById('adminDashboard');
  const activeUsers = data.users.filter(u => u.status === 'active' && u.role !== 'admin');
  const bannedUsers = data.users.filter(u => u.status === 'banned');
  const totalPosts = data.posts.length;
  const totalViews = data.posts.reduce((sum, p) => sum + (p.views || 0), 0);
  const totalMessages = (data.groupMessages || []).length + (data.privateMessages || []).length;
  
  // Most active users
  const userActivity = data.users.filter(u => u.role !== 'admin').map(u => ({
    ...u,
    totalLikes: data.posts.filter(p => p.userId === u.id).reduce((s, p) => s + p.likes.length, 0),
    totalPosts: data.posts.filter(p => p.userId === u.id).length,
    totalComments: data.posts.reduce((s, p) => s + p.comments.filter(c => c.userId === u.id).length, 0)
  })).sort((a, b) => (b.totalPosts + b.totalLikes + b.totalComments) - (a.totalPosts + a.totalLikes + a.totalComments));
  
  dashboard.innerHTML = `
    <div class="admin-stats-grid">
      <div class="admin-stat-card glass"><div class="stat-num" style="color:var(--primary)">${activeUsers.length}</div><div class="stat-label">活跃用户</div></div>
      <div class="admin-stat-card glass"><div class="stat-num" style="color:var(--danger)">${bannedUsers.length}</div><div class="stat-label">封禁用户</div></div>
      <div class="admin-stat-card glass"><div class="stat-num" style="color:var(--success)">${totalPosts}</div><div class="stat-label">总帖子数</div></div>
      <div class="admin-stat-card glass"><div class="stat-num" style="color:var(--warning)">${totalViews}</div><div class="stat-label">总浏览量</div></div>
      <div class="admin-stat-card glass"><div class="stat-num" style="color:var(--primary-light)">${totalMessages}</div><div class="stat-label">总消息数</div></div>

function renderAdminData() {
  const now = Date.now();
  const weekAgo = now - 7 * 24 * 60 * 60 * 1000;
  const monthAgo = now - 30 * 24 * 60 * 60 * 1000;
  
  const weekPosts = data.posts.filter(p => p.createdAt > weekAgo).length;
  const monthPosts = data.posts.filter(p => p.createdAt > monthAgo).length;
  const weekUsers = data.users.filter(u => u.joinTime > weekAgo && u.role !== 'admin').length;
  const weekMessages = (data.groupMessages || []).filter(m => m.time > weekAgo).length;
  
  // Topic distribution
  const topicCounts = {};
  data.posts.forEach(p => {
    topicCounts[p.topic] = (topicCounts[p.topic] || 0) + 1;
  });
  const topicNames = { 'acg':'ACG综合','anime':'新番讨论','manga':'漫画推荐','game':'游戏交流','music':'音乐推荐','art':'创作展示','cos':'COS摄影','life':'日常灌水','other':'其他' };
  
  return `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px">
      <div class="glass" style="padding:14px">
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">📊 近7天</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px">
          <div>新帖子: <strong>${weekPosts}</strong></div>
          <div>新用户: <strong>${weekUsers}</strong></div>
          <div>新消息: <strong>${weekMessages}</strong></div>
          <div>总帖子: <strong>${data.posts.length}</strong></div>
        </div>
      </div>
      <div class="glass" style="padding:14px">
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">📅 近30天</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px">
          <div>新帖子: <strong>${monthPosts}</strong></div>
          <div>活跃用户: <strong>${data.users.filter(u => u.lastActive > monthAgo && u.role !== 'admin').length}</strong></div>
        </div>
      </div>
    </div>
    
    <div class="glass" style="padding:14px;margin-bottom:12px">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">📂 话题分布</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${Object.entries(topicCounts).sort((a,b) => b[1]-a[1]).map(([t,c]) => `
          <div style="background:rgba(99,102,241,0.15);padding:6px 12px;border-radius:12px;font-size:13px">
            ${topicNames[t]||t}: <strong>${c}</strong>
          </div>
        `).join('')}
      </div>
    </div>
    
    <div class="glass" style="padding:14px">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">🏆 平台概览</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:14px">
        <div>注册用户: <strong>${data.users.filter(u=>u.role!=='admin').length}</strong></div>
        <div>总帖子: <strong>${data.posts.length}</strong></div>
        <div>总评论: <strong>${data.posts.reduce((s,p)=>s+p.comments.length,0)}</strong></div>
        <div>总点赞: <strong>${data.posts.reduce((s,p)=>s+p.likes.length,0)}</strong></div>
        <div>总收藏: <strong>${data.posts.reduce((s,p)=>s+p.favorites.length,0)}</strong></div>
        <div>总消息: <strong>${totalMessages()}</strong></div>
      </div>
    </div>
  `;
}

function totalMessages() {
  return (data.groupMessages || []).length + (data.privateMessages || []).length;
}

// Admin Actions

// ==================== Admin Edit User ====================
let adminEditingUserId = null;

function openAdminEditUser(userId) {
  const u = data.users.find(x => x.id === userId);
  if (!u) { showToast('用户不存在', 'error'); return; }
  adminEditingUserId = userId;
  document.getElementById('adminEditNickname').value = u.nickname;
  document.getElementById('adminEditPassword').value = '';
  openModal('adminEditUserModal');
}

function saveAdminEdit() {
  const u = data.users.find(x => x.id === adminEditingUserId);
  if (!u) { showToast('用户不存在', 'error'); return; }
  
  const newName = document.getElementById('adminEditNickname').value.trim();
  const newPwd = document.getElementById('adminEditPassword').value.trim();
  
  if (!newName) { showToast('昵称不能为空', 'error'); return; }
  
  u.nickname = newName;
  if (newPwd) {
    u.password = newPwd;
    showToast('昵称和密码已更新', 'success');
  } else {
    showToast('昵称已更新', 'success');
  }
  
  saveData();
  closeModal('adminEditUserModal');
  renderAdminDashboard();
  renderFeed();
}

function banUser(userId) {
  if (!confirm('确定封禁该用户吗？')) return;
  const u = data.users.find(x => x.id === userId);
  if (u) { u.status = 'banned'; saveData(); showToast('已封禁用户：' + u.nickname, 'error'); renderAdminDashboard(); }
}

function unbanUser(userId) {
  const u = data.users.find(x => x.id === userId);
  if (u) { u.status = 'active'; saveData(); showToast('已解封用户：' + u.nickname, 'success'); renderAdminDashboard(); }
}

function deleteUser(userId) {
  if (!confirm('确定注销该用户吗？此操作不可撤销！')) return;
  const u = data.users.find(x => x.id === userId);
  if (u) { u.status = 'deactivated'; saveData(); showToast('已注销用户', 'info'); renderAdminDashboard(); }
}

function deletePost(postId) {
  if (!confirm('确定删除该帖子吗？')) return;
  const idx = data.posts.findIndex(p => p.id === postId);
  if (idx > -1) {
    const post = data.posts[idx];
    // Reduce author's post count
    const author = data.users.find(u => u.id === post.userId);
    if (author) author.postsCount = Math.max(0, (author.postsCount || 0) - 1);
    data.posts.splice(idx, 1);
    saveData();
    showToast('帖子已删除', 'info');
    renderAdminDashboard();
    renderFeed(selectedTopic);
  }
}

function togglePinPost(postId) {
  const post = data.posts.find(p => p.id === postId);
  if (!post) return;
  post.pinned = !post.pinned;
  post.pinnedBy = post.pinned ? getCurrentUser().id : null;
  saveData();
  showToast(post.pinned ? '帖子已置顶' : '已取消置顶', 'info');
  renderAdminDashboard();
  renderFeed(selectedTopic);
}

// ==================== Logout ====================
function logout() {
  if (!confirm('确定退出登录吗？')) return;
  sessionStorage.removeItem('teahouse_session');
  currentUser = null;
  document.getElementById('appMain').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginPhone').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').textContent = '';
}

// ==================== Deactivate Account ====================
function deactivateAccount() {
  const u = getCurrentUser();
  if (!u) return;
  u.status = 'deactivated';
  saveData();
  showToast('账号已注销', 'info');
  logout();
}

// ==================== Modal Helpers ====================
function openModal(id) {
  document.getElementById(id).classList.add('show');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', (e) => {
    if (e.target === el) el.classList.remove('show');
  });
});

}

}
